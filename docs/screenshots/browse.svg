<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" role="img" aria-labelledby="title desc">
  <title id="title">Browse screenshot placeholder</title>
  <desc id="desc">Placeholder for an Android Automotive OS browse screenshot.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#101820"/>
      <stop offset="1" stop-color="#20303C"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="800" rx="56" fill="url(#bg)"/>
  <rect x="72" y="72" width="1136" height="656" rx="42" fill="#080B0E" stroke="#D6A04D" stroke-width="3"/>
  <text x="640" y="340" fill="#F7EFE0" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="700" text-anchor="middle">Browse</text>
  <text x="640" y="420" fill="#B7AEA1" font-family="Inter, Arial, sans-serif" font-size="30" text-anchor="middle">Replace with an AAOS media browse screenshot</text>
  <g transform="translate(434 492)">
    <rect width="120" height="150" rx="14" fill="#F7EFE0"/>
    <rect x="146" width="120" height="150" rx="14" fill="#2ED7B4"/>
    <rect x="292" width="120" height="150" rx="14" fill="#D96F3D"/>
  </g>
</svg>
